<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body style="padding: 100px; text-align: center;">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} w-50 mx-auto mt-3">
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}
  <h1>Login Now!!</h1>
  <form action="/userlogin" method="post">
    <div class="mb-3">
      <label for="email" class="form-label">Email address</label>
      <input type="email" class="form-control w-50 mx-auto" id="email" aria-describedby="emailHelp" name="email" required>
    </div>
    <div class="mb-3">
      <label for="password" class="form-label">Password</label>
      <input type="password" class="form-control w-50 mx-auto" id="password" name="password" required>
    </div>
    <button type="submit" class="btn btn-primary">Submit</button>
    <br>
    <a href="/register">Don't have an account?</a>
  </form>
</body>

</html>
