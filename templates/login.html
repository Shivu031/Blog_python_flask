<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta name="description" content="">
  <meta name="author" content="">

  <title>Sign-In</title>

  <!-- Bootstrap core CSS -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
    integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">

</head>

<body class="text-center" style="padding: 100px;">

  <form class="form-signin" action="/dashboard" method="post">
    <h1 class="h3 mb-3 font-weight-normal">Admin Login</h1>
    <label for="uname" class="sr-only">User Name</label>
    <input type="text" name="uname" id="uname" class="form-control" placeholder="User Name" required autofocus>
    <br>
    <label for="inputPassword" class="sr-only">Password</label>
    <input type="password" name="upass" id="inputPassword" class="form-control" placeholder="Password" required>
    <br>
    <div class="checkbox mb-3">
      <label>
        <input type="checkbox" value="remember-me"> Remember me
      </label>
    </div>
    <button class="btn btn-lg btn-primary btn-block" type="submit">Sign in</button>
    <p class="mt-5 mb-3 text-muted">© {{params['blog_name'] }} 2026-2027</p>
  </form>


</body>

</html>
